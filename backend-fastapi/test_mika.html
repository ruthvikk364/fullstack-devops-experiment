<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrainFree — Chat with Mika</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e4e4e7; height: 100vh; display: flex; justify-content: center; align-items: center; }

  .chat-container {
    width: 420px; height: 92vh; background: #111113; border: 1px solid #27272a;
    border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f172a, #1e293b); padding: 20px 24px;
    display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #27272a;
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #10b981, #059669);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .header-info h2 { font-size: 16px; color: #e4e4e7; font-weight: 600; }
  .header-info p { font-size: 12px; color: #10b981; }
  .header-badge {
    margin-left: auto; font-size: 11px; background: #10b981; color: #000;
    padding: 3px 10px; border-radius: 12px; font-weight: 600;
  }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

  .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
  .msg-bot {
    align-self: flex-start; background: #1e1e22; border: 1px solid #27272a;
    border-bottom-left-radius: 4px; color: #e4e4e7;
  }
  .msg-user {
    align-self: flex-end; background: #10b981; color: #000;
    border-bottom-right-radius: 4px; font-weight: 500;
  }
  .msg-system {
    align-self: center; background: transparent; color: #52525b;
    font-size: 12px; text-align: center; padding: 4px;
  }

  .typing { align-self: flex-start; padding: 12px 20px; }
  .typing span {
    display: inline-block; width: 8px; height: 8px; background: #10b981;
    border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

  /* Input */
  .input-area {
    padding: 16px 20px; border-top: 1px solid #27272a; background: #0a0a0b;
    display: flex; gap: 10px; align-items: center;
  }
  .input-area input {
    flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid #27272a;
    background: #18181b; color: #e4e4e7; font-size: 14px; outline: none;
  }
  .input-area input:focus { border-color: #10b981; }
  .input-area input:disabled { opacity: 0.5; }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: #10b981; color: #000; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .send-btn:hover { background: #059669; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Status bar */
  .status-bar {
    padding: 8px 20px; background: #0a0a0b; border-top: 1px solid #1a1a1e;
    display: flex; justify-content: space-between; font-size: 11px; color: #52525b;
  }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
  .status-dot.online { background: #10b981; }
  .status-dot.complete { background: #3b82f6; }

  /* Completion card */
  .complete-card {
    margin: 8px 0; padding: 16px; background: linear-gradient(135deg, #064e3b, #065f46);
    border: 1px solid #10b981; border-radius: 12px; text-align: center;
  }
  .complete-card h3 { color: #10b981; font-size: 16px; margin-bottom: 6px; }
  .complete-card p { color: #a7f3d0; font-size: 13px; }
  .user-id-box {
    margin-top: 10px; background: #0a0a0a; border-radius: 8px; padding: 8px 12px;
    font-family: monospace; font-size: 12px; color: #10b981; word-break: break-all;
    cursor: pointer;
  }
  .user-id-box:hover { background: #111; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="avatar">💪</div>
    <div class="header-info">
      <h2>Mika</h2>
      <p id="headerStatus">AI Fitness Coach</p>
    </div>
    <span class="header-badge" id="stepBadge">Starting</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Type your message..." autofocus>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
  </div>

  <div class="status-bar">
    <span><span class="status-dot online" id="statusDot"></span> <span id="statusText">Connecting...</span></span>
    <span id="sessionInfo">—</span>
  </div>
</div>

<script>
const API = 'http://localhost:8080/api';

let sessionId = null;
let userId = null;
let onboardingComplete = false;

const messagesEl = document.getElementById('messages');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

// Enter key sends
input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addHtml(html, type) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-bot typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setInputEnabled(enabled) {
  input.disabled = !enabled;
  sendBtn.disabled = !enabled;
  if (enabled) input.focus();
}

// Start session on page load
async function startSession() {
  setInputEnabled(false);
  document.getElementById('statusText').textContent = 'Connecting to Mika...';

  try {
    const resp = await fetch(API + '/onboarding/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await resp.json();

    sessionId = data.session_id;
    userId = data.user_id;

    document.getElementById('statusText').textContent = 'Online';
    document.getElementById('sessionInfo').textContent = 'ID: ' + userId.slice(0, 8) + '...';
    document.getElementById('stepBadge').textContent = 'Step 1/10';

    addMessage(data.message, 'bot');
    setInputEnabled(true);

  } catch (e) {
    document.getElementById('statusText').textContent = 'Connection failed';
    document.getElementById('statusDot').className = 'status-dot';
    addMessage('Could not connect to server. Make sure it\'s running on port 8080.', 'system');
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || !sessionId) return;

  addMessage(text, 'user');
  input.value = '';
  setInputEnabled(false);
  showTyping();

  try {
    const resp = await fetch(API + '/onboarding/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text }),
    });
    const data = await resp.json();

    hideTyping();
    addMessage(data.message, 'bot');

    // Update step indicator (rough estimate based on conversation length)
    const msgCount = messagesEl.querySelectorAll('.msg-user').length;
    const step = Math.min(msgCount + 1, 10);
    document.getElementById('stepBadge').textContent = data.onboarding_complete ? 'Complete!' : `Step ${step}/10`;

    if (data.onboarding_complete) {
      onboardingComplete = true;
      document.getElementById('headerStatus').textContent = 'Onboarding Complete';
      document.getElementById('statusDot').className = 'status-dot complete';
      document.getElementById('stepBadge').textContent = 'Done ✓';

      const cardHtml = `
        <div class="complete-card">
          <h3>🎉 Profile Complete!</h3>
          <p>${data.plan_generated ? 'Your fitness plan has been generated and emailed!' : 'Processing your plan...'}</p>
          <p style="margin-top:8px; font-size:12px; color:#6ee7b7;">Your User ID (save this):</p>
          <div class="user-id-box" onclick="navigator.clipboard.writeText('${userId}').then(()=>this.textContent='Copied!')">${userId}</div>
        </div>`;
      addHtml(cardHtml, 'system');

      input.placeholder = 'Onboarding complete! Save your User ID above.';
      setInputEnabled(false);
      return;
    }

    setInputEnabled(true);

  } catch (e) {
    hideTyping();
    addMessage('Network error — please try again.', 'system');
    setInputEnabled(true);
  }
}

// Boot
startSession();
</script>
</body>
</html>
